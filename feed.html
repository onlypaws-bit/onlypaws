<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OnlyPaws — Feed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root{
      --bg1:#6B4EFF;
      --bg2:#8B6CFF;
      --text:#ffffff;
      --muted:rgba(255,255,255,.85);
      --stroke:rgba(255,255,255,.16);
      --card:rgba(0,0,0,.16);
      --btn:#ffffff;
      --btnText:#6B4EFF;
      --shadow: rgba(0,0,0,.25);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(255,255,255,.18), transparent 55%),
        radial-gradient(1000px 650px at 90% 30%, rgba(0,0,0,.22), transparent 55%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height:100vh;
    }
    .wrap{max-width:1040px;margin:0 auto;padding:28px 18px 70px;}

    .nav{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;}
    .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:white;font-weight:900;}
    .brandLogo{
      width:62px;height:62px;border-radius:14px;background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.18);
      display:flex;align-items:center;justify-content:center;
    }
    .brandLogo img{width:46px;height:46px;object-fit:contain;}

    .navRight{display:flex;gap:10px;flex-wrap:wrap;}
    .navBtn{
      padding:10px 14px;border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
      color:white;font-weight:900;text-decoration:none;
      cursor:pointer;font-size:13px;
    }
    .navBtn.primary{
      background:var(--btn);border:none;color:var(--btnText);
      box-shadow:0 14px 30px rgba(0,0,0,.20);
    }

    .panel{
      border-radius:22px;padding:22px;
      background:var(--card);
      border:1px solid var(--stroke);
      backdrop-filter: blur(10px);
      box-shadow:0 20px 45px var(--shadow);
    }

    h1{margin:10px 0;font-size:2.4rem;}
    .sub{margin:0;color:var(--muted);}

    .search{
      width:100%;margin-top:12px;
      padding:12px 14px;border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.12);
      color:white;
    }

    .creatorList{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    @media (max-width: 920px){ .creatorList{grid-template-columns:1fr;} }

    .creatorLink{text-decoration:none;color:inherit;}
    .creatorCard{
      border-radius:18px;padding:14px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.16);
      display:flex;gap:12px;align-items:center;
    }
    .avatar{
      width:48px;height:48px;border-radius:16px;
      background:rgba(0,0,0,.18);
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    }
    .avatar img{width:100%;height:100%;object-fit:cover;}

    .posts{margin-top:12px;display:grid;gap:12px;}
    .postCard{
      border-radius:22px;padding:18px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.16);
    }

    footer{margin-top:28px;text-align:center;font-size:13px;color:rgba(255,255,255,.75);}
  </style>
</head>

<body>
<div class="wrap">

  <div class="nav">
    <a href="feed.html" class="brand">
      <div class="brandLogo"><img src="logo.png"></div>
      <span>OnlyPaws</span>
    </a>

    <div class="navRight">
      <a id="navProfile" class="navBtn primary" href="profile.html" style="display:none;">Profile</a>

      <!-- FAN -->
      <a id="navFanDash" class="navBtn" href="fan-dash.html" style="display:none;">Dashboard</a>

      <!-- CREATOR -->
      <a id="navCreatorDash" class="navBtn" href="creator-dash.html" style="display:none;">Dashboard</a>

      <button id="navLogout" class="navBtn" style="display:none;">Log out</button>
    </div>
  </div>

  <div class="panel">
    <h1>Feed</h1>
    <p class="sub">Browse creators and discover content.</p>
    <input class="search" placeholder="Search creators…" />
  </div>

  <footer>
    © 2026 OnlyPaws • Built with toe beans energy 🐾
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
  function goIndex(){ window.location.replace("index.html"); }
  function show(el, yes){ if(el) el.style.display = yes ? "inline-flex" : "none"; }

  async function hydrateNav(){
    const profileBtn = document.getElementById("navProfile");
    const fanDash = document.getElementById("navFanDash");
    const creatorDash = document.getElementById("navCreatorDash");
    const logoutBtn = document.getElementById("navLogout");

    show(profileBtn, true);
    show(logoutBtn, true);
    show(fanDash, false);
    show(creatorDash, false);

    const { data } = await onlypawsClient.auth.getUser();
    const userId = data?.user?.id;
    if(!userId) return;

    const { data: p } = await onlypawsClient
      .from("profiles")
      .select("role")
      .eq("user_id", userId)
      .maybeSingle();

    if(p?.role === "creator"){
      show(creatorDash, true);
    }else{
      show(fanDash, true);
    }
  }

  async function boot(){
    const { data } = await onlypawsClient.auth.getSession();
    if(!data?.session){ goIndex(); return; }
    await hydrateNav();
  }

  document.getElementById("navLogout")?.addEventListener("click", async () => {
    await onlypawsClient.auth.signOut();
    goIndex();
  });

  boot();
</script>
</body>
</html>
